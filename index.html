<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Buscador de Sitios</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      :root{
        --c-title:#0f172a;
        --c-subtitle:#64748b;
        --c-primary:#0f766e;
        --c-primary-soft:#d9f3ef;
        --c-text:#1e293b;
      }
      body.soft-ui { background: #e9edf3; font-family: "Poppins", system-ui, -apple-system, sans-serif; color:var(--c-text); }
      .soft-surface {
        background: linear-gradient(180deg, #f4f7fb 0%, #e8edf4 100%);
        border: 1px solid rgba(255,255,255,.8);
        box-shadow: 10px 10px 22px rgba(148,163,184,.28), -8px -8px 18px rgba(255,255,255,.9), inset 0 1px 0 rgba(255,255,255,.85);
      }
      .soft-press {
        box-shadow: inset 6px 6px 12px rgba(148,163,184,.28), inset -6px -6px 12px rgba(255,255,255,.9);
      }
      .soft-btn {
        background: linear-gradient(180deg,#eaf2ff 0%,#dce8ff 100%);
        box-shadow: 6px 6px 14px rgba(148,163,184,.3), -5px -5px 12px rgba(255,255,255,.9), inset 0 1px 0 rgba(255,255,255,.85);
      }
      .soft-btn-secondary {
        background: linear-gradient(180deg,#f7f9fc 0%,#edf2f8 100%);
      }
      .title-xl{font-size:1.35rem;line-height:1.4rem;font-weight:700;color:var(--c-title);letter-spacing:0}
      .title-sm{font-size:.78rem;line-height:1.1rem;font-weight:500;color:var(--c-subtitle)}
      .search-shell{
        position:relative;
        padding-left:2.7rem;
      }
      .search-shell::before{
        content:"";
        position:absolute;
        left:1rem; top:50%; transform:translateY(-50%);
        width:18px; height:18px; border:2px solid #94a3b8; border-radius:999px;
        opacity:.75;
      }
      .search-shell::after{
        content:"";
        position:absolute;
        left:2.05rem; top:58%;
        width:8px; height:2px; background:#94a3b8; transform:rotate(45deg);
        border-radius:2px;
      }
    </style>
  </head>
  <body class="soft-ui text-slate-900">
    <div
      id="welcome-overlay"
      class="fixed inset-0 z-50 bg-white flex items-center justify-center transition-opacity duration-500"
    >
      <div
        class="w-[92%] max-w-md border border-slate-200 rounded-2xl bg-white shadow-xl p-7 text-center"
      >
        <p
          class="text-teal-700 text-[11px] tracking-[0.18em] uppercase mb-2 font-semibold"
        >
          Sites Claro
        </p>
        <h2 class="text-slate-900 text-3xl sm:text-4xl font-extrabold">
          Bienvenido
        </h2>
        <p class="text-slate-500 text-sm mt-3">Iniciando buscador...</p>
        <div
          class="mt-5 h-1.5 w-full bg-slate-100 rounded-full overflow-hidden"
        >
          <div
            class="h-full w-1/2 bg-teal-600 rounded-full animate-pulse"
          ></div>
        </div>
      </div>
    </div>

    <main class="max-w-4xl mx-auto p-4 sm:p-6 space-y-4">
      <header class="soft-surface rounded-2xl p-5 sm:p-6">
        <h1 class="title-xl">Buscador de Sitios</h1>
        <p id="header-subtitle" class="title-sm mt-2">
          Cargando datos...
        </p>
      </header>

      <nav class="flex gap-3">
        <button
          class="tab-btn px-5 py-2.5 rounded-2xl text-sm font-semibold soft-btn"
          data-tab="search"
        >
          Buscar
        </button>
        <button
          class="tab-btn px-5 py-2.5 rounded-2xl text-sm font-semibold text-slate-600 soft-surface soft-btn-secondary"
          data-tab="config"
        >
          Editar datos
        </button>
      </nav>

      <section id="panel-search">
        <div class="soft-surface rounded-2xl p-4 sm:p-5">
          <div id="sync-wrap"></div>
          <div id="load-wrap" class="text-sm text-slate-500 py-8 text-center">
            Cargando sitios desde Google Sheets...
          </div>
          <div id="search-wrap" class="hidden">
            <input
              id="search-input"
              class="search-shell w-full rounded-2xl py-3 text-sm focus:outline-none soft-surface soft-press"
              placeholder="Codigo: LI0314, AC4534..."
              autocomplete="off"
            />
            <div id="search-results" class="mt-4"></div>
          </div>
        </div>
      </section>

      <section id="panel-config" class="hidden">
        <div class="soft-surface rounded-2xl p-4 sm:p-5">
          <h2 class="text-base font-semibold text-slate-800">Editar folio o llaves</h2>
          <p class="text-xs text-slate-500 mt-1 mb-4">
            Se guarda localmente en este navegador y tiene prioridad sobre el
            sheet.
          </p>
          <input
            id="config-input"
            class="search-shell w-full rounded-2xl py-3 text-sm focus:outline-none soft-surface soft-press"
            placeholder="Busca por codigo o nombre..."
            autocomplete="off"
          />
          <div id="config-suggestions" class="mt-4"></div>
          <div id="config-form" class="mt-4"></div>
        </div>
      </section>
    </main>

    <div
      id="toast"
      class="fixed left-1/2 -translate-x-1/2 bottom-5 px-4 py-2 bg-slate-900 text-white text-xs rounded-full opacity-0 pointer-events-none transition"
    >
      Copiado
    </div>

    <script>
      setTimeout(() => {
        const overlay = document.getElementById("welcome-overlay");
        if (!overlay) return;
        overlay.classList.add("opacity-0");
        setTimeout(() => overlay.remove(), 600);
      }, 1800);
    </script>
    <script type="module" src="./src/js/app.js"></script>
    <script>
      setTimeout(() => {
        if (window.__appBooted) return;
        const load = document.getElementById("load-wrap");
        if (!load) return;
        load.innerHTML =
          '<div class="text-sm text-red-700 bg-red-50 border border-red-200 rounded-lg p-3 text-left">No cargó el módulo de la app.<br><br>Abre desde <strong>http://localhost</strong> (no file://) y verifica que exista la carpeta <strong>src/js</strong> en el deploy.</div>';
      }, 2600);
    </script>
  </body>
</html>
